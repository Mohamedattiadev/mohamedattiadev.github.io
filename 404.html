<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Mohamed Attia</title>
  <script>
    // GitHub Pages SPA redirect (rafrex pattern): rewrite path into a query
    // and bounce to index.html which restores the real URL via replaceState.
    (function (l) {
      var segmentsToKeep = 0;
      l.replace(
        l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "") +
        l.pathname.split("/").slice(0, 1 + segmentsToKeep).join("/") + "/?/" +
        l.pathname.slice(1).split("/").slice(segmentsToKeep).join("/").replace(/&/g, "~and~") +
        (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
        l.hash
      );
    }(location));
  </script>
</head>
<body></body>
</html>
