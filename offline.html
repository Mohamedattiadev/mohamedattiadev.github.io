<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <style>
    :root{color-scheme:dark}
    html,body{margin:0;height:100%;background:#0d0a1a;color:#e6e4f1;font-family:"JetBrains Mono",ui-monospace,monospace}
    main{min-height:100%;display:grid;place-items:center;padding:2rem;text-align:center}
    h1{font-size:1.4rem;margin:0 0 .8rem;letter-spacing:-.02em}
    p{color:#9892b3;max-width:36ch;margin:0 0 1.4rem;line-height:1.6;font-size:.92rem}
    a{display:inline-block;padding:.7rem 1.2rem;border:1px solid #8b5cf6;border-radius:8px;color:#fff;background:rgba(139,92,246,.18);text-decoration:none;font-size:.85rem;letter-spacing:.04em}
    a:hover{background:rgba(139,92,246,.28)}
    .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#ef4444;margin-right:.5rem;vertical-align:middle}
    small{display:block;margin-top:1.6rem;color:#615b80;font-size:.7rem;letter-spacing:.1em;text-transform:uppercase}
  </style>
</head>
<body>
  <main>
    <div>
      <h1><span class="dot"></span>You are offline</h1>
      <p>This page is not in the cache yet. Reconnect and reload, or open a section you have already visited.</p>
